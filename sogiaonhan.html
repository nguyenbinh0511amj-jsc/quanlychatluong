<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Theo Dõi Tình Trạng Sản Phẩm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.10.25/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.25/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.25/js/dataTables.bootstrap5.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        /* ============================================
           PHẦN IN ẤN (PRINT) - GIỮ NGUYÊN
           ============================================ */

        /* Print form styles - giữ nguyên Times New Roman */
        #printArea,
        #printArea * {
            font-family: 'Times New Roman', Times, serif;
        }

        .containerin {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            padding: 20px;
        }

        .title {
            color: blue;
            font-weight: bold;
            font-size: 36px;
            text-align: center;
            margin: 10px 0;
            width: 85%;
        }

        .top-labels {
            display: flex;
        }

        .info-section {
            width: 85%;
            display: grid;
            grid-template-columns: 15% 35% 15% 35%;
            gap: 15px;
            margin: 7px 0;
        }

        .qr-code {
            width: 15%;
            text-align: right;
            margin-top: -84px;
        }

        .info-label {
            text-align: left;
        }

        .info-value {
            font-weight: bold;
        }

        .receipt-section {
            display: flex;
            flex-wrap: nowrap;
            gap: 5px;
            margin: 10px 0 !important;
            align-items: center;
        }

        .receipt-section .info-label {
            white-space: nowrap;
            margin-right: 5px;
        }

        .receipt-section .info-value {
            min-width: 80px;
            margin-right: 15px;
            flex-grow: 1;
        }

        /* Print form table styles */
        #printArea table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-family: 'Times New Roman', Times, serif;
        }

        #printArea th {
            border: 1px solid black;
            padding: 6px;
            text-align: center;
            background-color: #f0f0f0;
            color: blue;
            font-weight: bold;
        }

        #printArea td {
            border: 1px solid black;
            padding: 6px;
            text-align: center;
            height: 30px;
        }

        .double-column {
            grid-column: span 2;
        }

        .header_row {
            border: 1px solid black;
            padding: 6px;
            text-align: center;
            height: 50px;
        }

        .notes {
            margin-top: 5px;
            line-height: 0.7;
        }

        .top-label {
            width: 50%;
        }

        .cleaning-header {
            text-align: center;
        }

        /* CSS cho in ấn */
        @media print {
            body * {
                visibility: hidden;
                padding: 0 !important;
            }

            #printArea,
            #printArea * {
                visibility: visible;
            }

            #printArea {
                position: absolute;
                left: 0;
                top: 0;
                margin: 0 !important;
                padding: 0 !important;
                width: 100%;
            }

            /* Trang bản vẽ - mặt sau */
            .drawing-page {
                page-break-after: always;
                width: 100%;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0;
                margin: 0;
                overflow: hidden;
            }

            .drawing-page iframe {
                width: 100%;
                height: 100%;
                border: none;
            }

            .drawing-page img {
                width: 100%;
                height: 100%;
                object-fit: fill;
            }

            .page-break {
                page-break-after: always;
            }

            #dataTableSection,
            #printSelectedBtn,
            .loading,
            .error {
                display: none !important;
            }

            .containerin {
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: none !important;
                border-radius: 0 !important;
            }

            .top-labels,
            .info-section,
            table {
                margin: 0 !important;
                padding: 0 !important;
            }

            .fixed-header {
                position: static;
                box-shadow: none;
                padding: 0;
            }

            .table-content {
                margin-top: 0;
            }
        }

        /* ============================================
           PHẦN GIAO DIỆN WEB - REDESIGN MỚI
           ============================================ */

        /* === ROOT & DESIGN TOKENS === */
        :root {
            --bg-primary: #f0f2f8;
            --bg-secondary: #e8eaf0;
            --bg-card: rgba(255, 255, 255, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.55);
            --bg-glass-hover: rgba(110, 142, 251, 0.07);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a68;
            --text-muted: #8e8ea0;
            --accent-1: #6e8efb;
            --accent-2: #a777e3;
            --accent-3: #0288d1;
            --gradient-main: linear-gradient(135deg, #6e8efb 0%, #a777e3 100%);
            --gradient-subtle: linear-gradient(135deg, rgba(110, 142, 251, 0.1) 0%, rgba(167, 119, 227, 0.1) 100%);
            --border-color: rgba(0, 0, 0, 0.08);
            --border-active: rgba(110, 142, 251, 0.5);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 20px rgba(110, 142, 251, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* === GLOBAL === */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Animated background mesh */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(110, 142, 251, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(167, 119, 227, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(79, 195, 247, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 15s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* === CONTAINER === */
        .container {
            position: relative;
            z-index: 1;
            margin: 0 auto;
            background-color: transparent;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* === FIXED HEADER — GLASSMORPHISM === */
        .fixed-header {
            flex-shrink: 0;
            z-index: 1000;
            padding: 16px 32px 12px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            border-bottom: 1px solid var(--border-color);
        }

        .fixed-header h1 {
            font-family: 'Inter', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 14px;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        /* === LOADING INDICATOR === */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 24px;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            color: var(--accent-1);
            margin-bottom: 12px;
        }

        .loading:before {
            content: "";
            width: 22px;
            height: 22px;
            border: 3px solid rgba(110, 142, 251, 0.2);
            border-top-color: var(--accent-1);
            border-right-color: var(--accent-2);
            border-radius: 50%;
            animation: spinGlow 0.8s linear infinite;
            display: inline-block;
            flex-shrink: 0;
        }

        @keyframes spinGlow {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #e53935;
            text-align: center;
            margin: 16px 0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            display: none;
            padding: 12px 20px;
            background: rgba(229, 57, 53, 0.06);
            border: 1px solid rgba(229, 57, 53, 0.15);
            border-radius: var(--radius-md);
        }

        /* === MULTI-SEARCH BAR === */
        .multi-search-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            transition: border-color var(--transition-smooth);
            box-shadow: var(--shadow-sm);
        }

        .multi-search-container:focus-within {
            border-color: var(--border-active);
            box-shadow: var(--shadow-glow);
        }

        .multi-search-container label {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        #multiSearchInput {
            flex: 1;
            min-width: 280px;
            padding: 10px 16px;
            background: white;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-smooth);
        }

        #multiSearchInput::placeholder {
            color: var(--text-muted);
        }

        #multiSearchInput:focus {
            border-color: var(--accent-1);
            background: white;
            box-shadow: 0 0 0 3px rgba(110, 142, 251, 0.1);
        }

        /* === BUTTONS === */
        .btn-gradient {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-smooth);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        #autoCheckBtn {
            background: var(--gradient-main);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition-smooth);
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(110, 142, 251, 0.2);
        }

        #autoCheckBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(110, 142, 251, 0.35);
        }

        #autoCheckBtn:active {
            transform: translateY(0);
        }

        #clearSearchBtn {
            background: rgba(229, 57, 53, 0.08);
            color: #e53935;
            border: 1px solid rgba(229, 57, 53, 0.2);
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition-smooth);
            white-space: nowrap;
        }

        #clearSearchBtn:hover {
            background: rgba(229, 57, 53, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 57, 53, 0.12);
        }

        #clearSearchBtn:active {
            transform: translateY(0);
        }

        .search-result-info {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 4px;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
        }

        /* === ACTION BAR === */
        .action-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
            padding: 8px 0;
        }

        #printSelectedBtn {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 28px;
            background: var(--gradient-main);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            cursor: pointer;
            transition: all var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(110, 142, 251, 0.25);
            letter-spacing: 0.3px;
        }

        #printSelectedBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(110, 142, 251, 0.4);
        }

        #printSelectedBtn:active {
            transform: translateY(-1px);
        }

        .action-bar .dataTables_length {
            margin: 0 !important;
            padding: 0 !important;
        }

        .action-bar .dataTables_length label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .action-bar .dataTables_length select {
            padding: 6px 10px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: border-color var(--transition-fast);
        }

        .action-bar .dataTables_length select:focus {
            border-color: var(--accent-1);
            outline: none;
        }

        /* === TABLE CONTENT === */
        .table-content {
            flex: 1;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            margin-top: 0;
            padding: 0 32px;
            min-height: 0;
        }

        /* === DATA TABLE === */
        #dataTable {
            font-family: 'Inter', sans-serif;
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            table-layout: fixed;
            border: none;
            border-radius: var(--radius-md);
            box-shadow: none;
            margin: 0;
            background: transparent;
        }

        /* === DATA TABLE THEAD (STICKY) === */
        #dataTable thead {
            position: sticky;
            top: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
        }

        #dataTable thead tr {
            background: var(--gradient-main);
        }

        #dataTable thead th {
            font-family: 'Inter', sans-serif;
            color: white !important;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            padding: 14px 16px;
            border: none !important;
            border-right: 1px solid rgba(255, 255, 255, 0.12) !important;
            text-align: center;
        }

        #dataTable thead th:last-child {
            border-right: none !important;
        }

        /* Checkbox in header */
        #selectAll {
            width: 18px;
            height: 18px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            background: transparent;
            position: relative;
            transition: all var(--transition-fast);
        }

        #selectAll:checked {
            background: white;
            border-color: white;
        }

        #selectAll:checked::after {
            content: '✓';
            color: var(--accent-1);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: 700;
        }

        #dataTable td {
            padding: 14px 16px;
            border: none;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            transition: all var(--transition-fast);
            vertical-align: middle;
            text-align: center;
        }

        #dataTable tbody tr {
            background: white;
            transition: all var(--transition-smooth);
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        #dataTable tbody tr:last-child td {
            border-bottom: none;
        }

        #dataTable tbody tr:hover {
            background: rgba(110, 142, 251, 0.06) !important;
            transform: none;
            box-shadow: none;
        }

        #dataTable tbody tr:hover td {
            color: var(--text-primary);
        }

        #dataTable.table-striped tbody tr:nth-of-type(odd) {
            background-color: white;
        }

        /* Highlight matching rows */
        #dataTable tbody tr.search-highlight {
            background-color: rgba(110, 142, 251, 0.1) !important;
            border-left: 3px solid var(--accent-1);
        }

        /* === CUSTOM CHECKBOXES IN TABLE === */
        #dataTable input[type="checkbox"],
        .row-checkbox {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 2px solid rgba(0, 0, 0, 0.18);
            background: white;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            position: relative;
            transition: all var(--transition-bounce);
            transform: scale(1);
        }

        #dataTable input[type="checkbox"]:hover,
        .row-checkbox:hover {
            border-color: var(--accent-1);
            box-shadow: 0 0 8px rgba(110, 142, 251, 0.2);
        }

        #dataTable input[type="checkbox"]:checked,
        .row-checkbox:checked {
            background: var(--gradient-main);
            border-color: transparent;
            animation: checkBounce 0.3s ease;
        }

        @keyframes checkBounce {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        #dataTable input[type="checkbox"]:checked::after,
        .row-checkbox:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px;
            font-weight: 700;
        }

        /* Quick print button in table */
        #dataTable td button,
        #dataTable td [onclick*="quickPrint"] {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }

        #dataTable td button:hover,
        #dataTable td [onclick*="quickPrint"]:hover {
            background: rgba(110, 142, 251, 0.08);
            transform: scale(1.15);
        }

        /* Links in table */
        #dataTable td a {
            color: #e53935 !important;
            text-decoration: none !important;
            font-weight: 500;
            transition: all var(--transition-fast);
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(229, 57, 53, 0.06);
        }

        #dataTable td a:hover {
            background: rgba(229, 57, 53, 0.12);
            box-shadow: 0 0 8px rgba(229, 57, 53, 0.08);
        }

        /* === TABLE RESPONSIVE === */
        .table-responsive {
            border-radius: 0;
            overflow: visible;
            padding: 0;
            margin-bottom: 0;
            background: transparent;
        }

        /* DataTables wrapper trong vùng cuộn */
        .table-content .dataTables_wrapper {
            padding-bottom: 20px;
        }

        /* === DATATABLES BOOTSTRAP OVERRIDES === */
        #dataTable.table-bordered th,
        #dataTable.table-bordered td {
            border-top: none;
            border-left: none;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid transparent;
        }

        #dataTable[style*="display: none"] {
            display: none !important;
        }

        /* === CONTAINER === */
        #mainContainer {
            position: relative;
            z-index: 1;
            max-width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* === DATATABLES CONTROLS === */
        .top {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .dataTables_length {
            margin-right: auto;
        }

        .dataTables_filter {
            margin-left: auto;
        }

        .dataTables_length label,
        .dataTables_filter label {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .dataTables_filter input {
            margin-left: 8px;
        }

        .dataTables_wrapper .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px 0;
        }

        .dataTables_length {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dataTables_length label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            font-weight: normal;
        }

        .dataTables_length select {
            padding: 6px 10px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        .dataTables_filter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dataTables_filter label {
            display: flex;

        // Function to fetch product data from san_pham table
        async function fetchProductData(tenChiTiet) {
            // Kiểm tra cache trước
            if (productCache[tenChiTiet]) {
                return productCache[tenChiTiet];
            }

            try {
                const response = await fetch(`https://${region}.appsheet.com/api/v2/apps/${appId}/tables/san_pham/Action`, {
                    method: 'POST',
                    headers: {
                        'ApplicationAccessKey': accessKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        Action: 'Find',
                        Properties: {},
                        Selector: `[ten_chi_tiet] = "${tenChiTiet}"`
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) {
                    console.warn('Không tìm thấy dữ liệu sản phẩm cho tên chi tiết:', tenChiTiet);
                    productCache[tenChiTiet] = null; // Cache kết quả null
                    return null; // Trả về null nếu không tìm thấy
                }

                // Tìm chính xác bản ghi với ten_chi_tiet
                const exactMatch = data.find(item => item.ten_chi_tiet === tenChiTiet);
                if (!exactMatch) {
                    console.warn('Không tìm thấy sản phẩm khớp chính xác với tên chi tiết:', tenChiTiet);
                    const result = data[0]; // Trả về bản ghi đầu tiên nếu không có khớp chính xác
                    productCache[tenChiTiet] = result; // Cache kết quả
                    return result;
                }

                // Cache kết quả tìm được
                productCache[tenChiTiet] = exactMatch;
                return exactMatch;
            } catch (error) {
                console.error('Lỗi khi lấy dữ liệu sản phẩm:', error);
                return null; // Trả về null nếu có lỗi
            }
        }

        const renderedDrawingCache = {};

        // Tạo trang bản vẽ (mặt sau) cho in 2 mặt
        async function createDrawingPage(fileBanVe) {
            // Kiểm tra cache trước
            if (renderedDrawingCache[fileBanVe]) {
                const page = document.createElement('div');
                page.className = 'drawing-page';
                page.style.pageBreakAfter = 'always';
                const img = document.createElement('img');
                img.src = renderedDrawingCache[fileBanVe];
                img.style.cssText = 'width:100%; height:100%; object-fit:contain;';
                page.appendChild(img);
                return page;
            }

            const drawingUrl = `https://www.appsheet.com/template/gettablefileurl?appName=Quảnlýchấtlượng-648353741&tableName=san_pham&fileName=${encodeURIComponent(fileBanVe)}`;
            // Chọn proxy phù hợp theo môi trường
            const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            const isVercel = location.hostname.includes('vercel.app') || location.hostname.includes('.vercel.');
            let fetchUrl;
            if (isLocal) {
                fetchUrl = `/proxy?url=${encodeURIComponent(drawingUrl)}`;
            } else if (isVercel || location.pathname === '/sogiaonhan.html') {
                // Vercel hoặc bất kỳ host nào có /api/proxy
                fetchUrl = `/api/proxy?url=${encodeURIComponent(drawingUrl)}`;
            } else {
                fetchUrl = `https://corsproxy.io/?${encodeURIComponent(drawingUrl)}`;
            }
            const page = document.createElement('div');
            page.className = 'drawing-page';
            page.style.pageBreakAfter = 'always';

            const ext = fileBanVe.split('.').pop().toLowerCase();

            if (ext === 'pdf') {
                try {
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    const response = await fetch(fetchUrl);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const arrayBuffer = await response.arrayBuffer();
                    
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const pdfPage = await pdf.getPage(1);
                    
                    // Scale 4 = 288 DPI (nhanh hơn 2x so với scale 6, chất lượng vẫn tốt)
                    const scale = 4;
                    const viewport = pdfPage.getViewport({ scale });
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    
                    await pdfPage.render({ canvasContext: ctx, viewport }).promise;
                    
                    // Xoay 90° nếu dọc
                    let finalCanvas = canvas;
                    if (canvas.height > canvas.width) {
                        const rc = document.createElement('canvas');
                        rc.width = canvas.height;
                        rc.height = canvas.width;
                        const rCtx = rc.getContext('2d');
                        rCtx.translate(rc.width / 2, rc.height / 2);
                        rCtx.rotate(90 * Math.PI / 180);
                        rCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
                        finalCanvas = rc;
                    }
                    
                    // JPEG nhanh hơn PNG 5-10 lần, chất lượng 95%
                    const dataUrl = finalCanvas.toDataURL('image/jpeg', 0.95);
                    renderedDrawingCache[fileBanVe] = dataUrl;
                    
                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.style.cssText = 'width:100%; height:100%; object-fit:contain;';
                    page.appendChild(img);
                } catch (err) {
                    console.error('Lỗi render PDF:', err);
                    page.innerHTML = '<p style="text-align:center; font-size:14px; color:#999;">Không tải được bản vẽ PDF</p>';
                }
            } else {
                // Dùng img cho ảnh (jpg, png, ...)
                const img = document.createElement('img');
                img.src = fetchUrl;
                img.style.cssText = 'max-width:100%; max-height:100vh; object-fit:contain;';
                page.appendChild(img);
                // Đợi ảnh tải xong
                await new Promise((resolve) => {
                    img.onload = resolve;
                    img.onerror = () => {
                        page.innerHTML = '<p style="text-align:center; font-size:14px; color:#999;">Không tải được bản vẽ</p>';
                        resolve();
                    };
                });
            }
            return page;
        }

        async function check3DQuang(tenChiTiet) {
            if (quang3DCache.hasOwnProperty(tenChiTiet)) {
                return quang3DCache[tenChiTiet];
            }
            try {
                const response = await fetch(`https://${region}.appsheet.com/api/v2/apps/${appId}/tables/thoi_gian_do_ga_lap_3d_quang/Action`, {
                    method: 'POST',
                    headers: {
                        'ApplicationAccessKey': accessKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        Action: 'Find',
                        Properties: {},
                        Selector: `[ten_chi_tiet] = "${tenChiTiet}"`
                    })
                });
                if (!response.ok) {
                    quang3DCache[tenChiTiet] = null;
                    return null;
                }
                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) {
                    quang3DCache[tenChiTiet] = null;
                    return null;
                }
                // Kiểm tra khớp chính xác ten_chi_tiet (API có thể trả về kết quả không chính xác)
                const exactMatch = data.find(item => item.ten_chi_tiet === tenChiTiet);
                if (!exactMatch) {
                    console.warn('3D Quang - Không khớp chính xác:', tenChiTiet,
                        '| API trả về:', data.map(d => d.ten_chi_tiet));
                    quang3DCache[tenChiTiet] = null;
                    return null;
                }
                quang3DCache[tenChiTiet] = exactMatch;
                return exactMatch;
            } catch (error) {
                console.error('3D Quang - Lỗi:', tenChiTiet, error);
                quang3DCache[tenChiTiet] = null;
                return null;
            }
        }

        async function printSelectedForms() {
            const selectedOrders = [];
            document.querySelectorAll('.row-checkbox:checked').forEach(checkbox => {
                selectedOrders.push(checkbox.getAttribute('data-order'));
            });

            if (selectedOrders.length === 0) {
                alert('Vui lòng chọn ít nhất một phiếu để in.');
                return;
            }

            const loadingEl = document.getElementById('loadingIndicator');
            loadingEl.style.display = 'block';
            loadingEl.textContent = 'Đang tạo phiếu in...';

            // Chờ dữ liệu nền (products, 3D quang, PSX) nạp xong
            await Promise.all([productsReadyPromise, quang3DReadyPromise, psxReadyPromise]);

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';

            try {
                // Bước 1: Chuẩn bị dữ liệu và tìm các PDF cần tải
                const orderItems = [];
                const pdfFilesToLoad = new Set();
                
                for (const orderId of selectedOrders) {
                    const orderData = orderDataMap.get(orderId) || allOrderData.find(item => item.order_kd === orderId);
                    if (!orderData) continue;
                    const productData = productCache[orderData.ten_chi_tiet] || null;
                    orderItems.push({ orderData, productData });
                    if (productData && productData.file_ban_ve) {
                        pdfFilesToLoad.add(productData.file_ban_ve);
                    }
                }

                // Bước 2: Tải TẤT CẢ PDF song song (không chờ từng cái)
                const drawingCache = {};
                if (pdfFilesToLoad.size > 0) {
                    loadingEl.textContent = `Đang tải ${pdfFilesToLoad.size} bản vẽ...`;
                    const pdfPromises = [...pdfFilesToLoad].map(async (fileBanVe) => {
                        try {
                            const drawingPage = await createDrawingPage(fileBanVe);
                            drawingCache[fileBanVe] = drawingPage;
                        } catch (e) {
                            console.error('Lỗi tải bản vẽ:', fileBanVe, e);
                        }
                    });
                    await Promise.all(pdfPromises);
                }

                // Bước 3: Ghép phiếu + bản vẽ vào printArea (rất nhanh vì đã cache)
                loadingEl.textContent = 'Đang tạo phiếu in...';
                for (const { orderData, productData } of orderItems) {
                    const formElement = createForm(orderData, productData);
                    printArea.appendChild(formElement);

                    const qrContainer = formElement.querySelector('.qr-code');
                    if (qrContainer) {
                        new QRCode(qrContainer, {
                            text: orderData.order_kd,
                            width: 150,
                            height: 150,
                            correctLevel: QRCode.CorrectLevel.H
                        });
                    }

                    // Thêm trang bản vẽ đã cache
                    if (productData && productData.file_ban_ve && drawingCache[productData.file_ban_ve]) {
                        // Clone node vì cùng file có thể dùng cho nhiều phiếu
                        const drawingClone = drawingCache[productData.file_ban_ve].cloneNode(true);
                        printArea.appendChild(drawingClone);
                    }
                }

                loadingEl.style.display = 'none';

                setTimeout(() => {
                    window.print();
                    setTimeout(() => {
                        printArea.innerHTML = '';
                    }, 500);
                }, 300);

            } catch (error) {
                console.error('Lỗi khi xử lý in phiếu:', error);
                loadingEl.style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'Đã xảy ra lỗi khi in phiếu: ' + error.message;
                printArea.innerHTML = '';
            }
        }

                    // Bỏ qua nếu click vào checkbox, nút, hoặc link
                    const target = e.target;
                    if (target.tagName === 'INPUT' || target.tagName === 'BUTTON' || target.tagName === 'A' || target.closest('button') || target.closest('a')) {
                        return;
                    }
                    const checkbox = this.querySelector('.row-checkbox');
                    if (checkbox) {
                        checkbox.checked = !checkbox.checked;
                    }
                });

                console.log(`Bảng hiển thị: ${orderData.length} orders`);

                // Các dữ liệu còn lại tải ngầm — khi nào xong thì cập nhật cache
                productsReadyPromise = productsPromise.then(productData => {
                    for (let i = 0; i < productData.length; i++) {
                        if (productData[i].ten_chi_tiet) {
                            productCache[productData[i].ten_chi_tiet] = productData[i];
                        }
                    }
                    console.log(`Products cached: ${productData.length}`);
                    // Cập nhật lại bảng để hiện link "In bản vẽ"
                    if (dataTable) {
                        dataTable.rows().invalidate().draw(false);
                    }
                }).catch(err => console.warn('Lỗi tải products:', err));

                quang3DReadyPromise = quang3DPromise.then(quang3DData => {
                    for (let i = 0; i < quang3DData.length; i++) {
                        if (quang3DData[i].ten_chi_tiet) {
                            quang3DCache[quang3DData[i].ten_chi_tiet] = quang3DData[i];
                        }
                    }
                    console.log(`3D quang cached: ${quang3DData.length}`);
                }).catch(err => console.warn('Lỗi tải 3D quang:', err));

                psxReadyPromise = psxPromise.then(giaoHangPSXData => {
                    for (let i = 0; i < giaoHangPSXData.length; i++) {
                        const item = giaoHangPSXData[i];
                        if (item.order_kd && item.sl_da_xac_nhan_khi_giao_hang && item.noi_dung_da_xac_nhan_khi_giao_hang) {
                            if (!giaoHangPSXCache[item.order_kd]) {
                                giaoHangPSXCache[item.order_kd] = [];
                            }
                            giaoHangPSXCache[item.order_kd].push(item);
                        }
                    }
                    console.log(`PSX cached: ${giaoHangPSXData.length}`);
                }).catch(err => console.warn('Lỗi tải PSX:', err));

            } catch (error) {
                console.error('Lỗi khởi tạo trang:', error);
                loadingEl.style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'Đã xảy ra lỗi: ' + error.message;
            }
        }

        // ===== TỰ ĐỘNG ĐIỀU CHỈNH (FLEXBOX - KHÔNG CẦN MARGIN) =====
        function adjustTableContentMargin() {
            // Flexbox layout tự xử lý, không cần tính toán margin
        }

        // Cập nhật khi thay đổi kích thước cửa sổ
        window.addEventListener('resize', adjustTableContentMargin);

        // ===== DI CHUYỂN LENGTH CONTROL =====
        function moveLengthControl() {
            // Tạo length control thủ công vì đã bỏ 'l' khỏi dom
            const placeholder = document.getElementById('lengthControlPlaceholder');
            if (!placeholder || !dataTable) return;

            const lengthOptions = [10, 25, 50, 100, -1];
            const lengthLabels = ['10', '25', '50', '100', 'Tất cả'];
            const currentLength = dataTable.page.len();

            let selectHTML = '<select id="customPageLength">';
            for (let i = 0; i < lengthOptions.length; i++) {
                const selected = lengthOptions[i] === currentLength ? ' selected' : '';
                selectHTML += `<option value="${lengthOptions[i]}"${selected}>${lengthLabels[i]}</option>`;
            }
            selectHTML += '</select>';

            placeholder.innerHTML = `<div class="dataTables_length"><label>Hiển thị ${selectHTML} dữ liệu</label></div>`;

            // Gắn sự kiện thay đổi
            document.getElementById('customPageLength').addEventListener('change', function () {
                dataTable.page.len(parseInt(this.value)).draw();
            });
        }

        // ===== MULTI-SEARCH FUNCTIONALITY =====
        let activeSearchTerms = []; // Lưu các từ khóa đang tìm kiếm

        function setupMultiSearch() {
            const searchInput = document.getElementById('multiSearchInput');
            const autoCheckBtn = document.getElementById('autoCheckBtn');
            const clearSearchBtn = document.getElementById('clearSearchBtn');
            const searchResultInfo = document.getElementById('searchResultInfo');

            // Xử lý tìm kiếm khi nhập
            searchInput.addEventListener('input', function () {
                performMultiSearch(this.value);
            });

            // Xử lý khi nhấn Enter
            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performMultiSearch(this.value);
                    // Auto-check kết quả khi nhấn Enter
                    autoCheckVisibleRows();
                }
            });

            // Nút tích tất cả kết quả
            autoCheckBtn.addEventListener('click', function () {
                autoCheckVisibleRows();
            });

            // Nút xóa tìm kiếm
            clearSearchBtn.addEventListener('click', function () {
                searchInput.value = '';
                activeSearchTerms = [];
                searchResultInfo.textContent = '';

                // Xóa custom filter
                $.fn.dataTable.ext.search.length = 0;
                dataTable.draw();

                // Bỏ tích tất cả checkbox
                document.querySelectorAll('.row-checkbox').forEach(cb => {
                    cb.checked = false;
                });
                document.getElementById('selectAll').checked = false;

                // Xóa highlight
                document.querySelectorAll('#dataTable tbody tr').forEach(tr => {
                    tr.classList.remove('search-highlight');
                });
            });
        }

        function performMultiSearch(searchValue) {
            const searchResultInfo = document.getElementById('searchResultInfo');

            // Tách các từ khóa bằng dấu phẩy, loại bỏ khoảng trắng thừa
            activeSearchTerms = searchValue
                .split(',')
                .map(term => term.trim().toLowerCase())
                .filter(term => term.length > 0);

            // Xóa custom filter cũ
            $.fn.dataTable.ext.search.length = 0;

            if (activeSearchTerms.length === 0) {
                searchResultInfo.textContent = '';
                dataTable.draw();
                return;
            }

            // Thêm custom filter mới - tìm theo OR (bất kỳ từ khóa nào khớp)
            $.fn.dataTable.ext.search.push(function (settings, data, dataIndex) {
                // data[4] là cột Order KD (index 4)
                const orderKD = (data[4] || '').toLowerCase();
                // data[5] là cột Tên chi tiết (index 5)
                const tenChiTiet = (data[5] || '').toLowerCase();

                // Kiểm tra xem bất kỳ từ khóa nào khớp với Order KD hoặc Tên chi tiết
                return activeSearchTerms.some(term =>
                    orderKD.includes(term) || tenChiTiet.includes(term)
                );
            });

            dataTable.draw();

            // Hiển thị số kết quả
            const visibleCount = dataTable.rows({ filter: 'applied' }).count();
            searchResultInfo.textContent = `Tìm thấy ${visibleCount} kết quả cho ${activeSearchTerms.length} từ khóa`;

            // Highlight các dòng tìm được
            highlightSearchResults();
        }

        function autoCheckVisibleRows() {
            const searchResultInfo = document.getElementById('searchResultInfo');
            let checkedCount = 0;

            // Lấy tất cả các dòng đang hiển thị (sau khi lọc)
            dataTable.rows({ filter: 'applied' }).every(function (rowIdx) {
                const node = this.node();
                if (node) {
                    const checkbox = node.querySelector('.row-checkbox');
                    if (checkbox && !checkbox.checked) {
                        checkbox.checked = true;
                        checkedCount++;
                    }
                }
            });

            // Cập nhật thông tin
            const totalChecked = document.querySelectorAll('.row-checkbox:checked').length;
            if (checkedCount > 0) {
                searchResultInfo.textContent = `Đã tích ${checkedCount} mục mới. Tổng đã tích: ${totalChecked}`;

                // Thông báo toast
                if (typeof Toastify !== 'undefined') {
                    Toastify({
                        text: `✅ Đã tích ${checkedCount} checkbox (Tổng: ${totalChecked})`,
                        duration: 2000,
                        gravity: 'top',
                        position: 'center',
                        backgroundColor: 'linear-gradient(to right, #6e8efb, #a777e3)',
                        stopOnFocus: true
                    }).showToast();
                }
            } else {
                searchResultInfo.textContent = `Tất cả kết quả đã được tích. Tổng: ${totalChecked}`;
            }
        }

        function highlightSearchResults() {
            // Xóa highlight cũ
            document.querySelectorAll('#dataTable tbody tr').forEach(tr => {
                tr.classList.remove('search-highlight');
            });

            // Thêm highlight cho các dòng visible
            dataTable.rows({ filter: 'applied' }).every(function () {
                const node = this.node();
                if (node) {
                    node.classList.add('search-highlight');
                }
            });
        }

        // Khởi chạy khi trang đã tải xong
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
